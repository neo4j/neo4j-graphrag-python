tasks:
  - id: task-001
    title: "Add Neo4j server version detection utility with caching"
    description: |
      Create a utility function that queries Neo4j server version via
      `CALL dbms.components() YIELD versions` and parses the semver result.
      Cache the version per driver instance to avoid repeated queries.
      Add a helper to check if version >= 2026.01 (SEARCH clause support).
      Place in a shared utility module accessible by all retrievers.
    status: completed
    dependencies: []
    acceptance_criteria:
      - "Function queries dbms.components() and returns parsed (major, minor, patch) tuple"
      - "Result is cached per driver instance — second call does not hit the database"
      - "Helper function `supports_search_clause(driver)` returns bool"
      - "Unit tests with mocked driver verify parsing and caching behavior"
      - "Handles connection errors gracefully (defaults to False / old path)"
    completed_at: 2026-03-13T14:00:00Z

  - id: task-002
    title: "Add filter classification for SEARCH-compatible predicates"
    description: |
      Add a function in filters.py that inspects a filter dict and classifies
      it as SEARCH-compatible or not. SEARCH-compatible means all predicates
      are simple property comparisons (>, <, >=, <=, =) joined only by AND.
      Filters using $or, $in, $like, $contains, or nested logic are incompatible.
      Return a structured result with the compatible Cypher WHERE clause or a
      fallback indicator.
    status: completed
    dependencies: []
    acceptance_criteria:
      - "Function accepts the existing filter dict format and returns (is_compatible, cypher_where_clause, params)"
      - "Simple AND comparisons classified as compatible with correct Cypher output"
      - "$or, $in, $like, $contains, nested filters classified as incompatible"
      - "Empty/None filters classified as compatible (no WHERE clause needed)"
      - "Unit tests cover all filter operator types and edge cases"
    completed_at: 2026-03-13T14:30:00Z

  - id: task-003
    title: "Add SEARCH clause Cypher query builder in neo4j_queries.py"
    description: |
      Add a new function to generate the SEARCH clause Cypher for vector queries:
      `MATCH (n:Label) SEARCH n IN (VECTOR INDEX indexName FOR $queryVector
      WHERE <predicates> LIMIT $k) SCORE AS score`. Support optional WHERE clause
      from the filter classification output. Integrate with existing query builder
      patterns in the module.
    status: completed
    dependencies:
      - task-002
    acceptance_criteria:
      - "Generates correct SEARCH clause Cypher with no filters"
      - "Generates correct SEARCH clause Cypher with WHERE predicates"
      - "Parameterizes query vector and filter values properly"
      - "Follows existing query builder patterns in neo4j_queries.py"
      - "Unit tests verify generated Cypher strings for various inputs"
    completed_at: 2026-03-13T15:00:00Z

